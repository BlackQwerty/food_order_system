<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickEat — Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!--navigation bar-->
   <div id="navbar-placeholder"></div>

  <!-- ========== PAGE HEADER ========== -->
  <section class="page-header">
    <h1>Welcome Back!</h1>
    <p>Sign in to your ClickEat account</p>
  </section>

  <!-- ========== LOGIN FORM ========== -->
  <section class="section-sm">
    <div class="form-container">

      <form id="loginForm" action="/php_backend/login-process.php" method="POST" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="e.g. ahmad@example.com" autocomplete="email">
          <span class="error-msg" id="emailError"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
          <span class="error-msg" id="passwordError"></span>
        </div>

        <!-- Remember Me + Forgot Password -->
        <div class="flex-between" style="margin-bottom:16px;">
          <div class="form-check">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <label for="rememberMe">Remember Me</label>
          </div>
          <a href="#" class="btn-link" onclick="alert('Password reset link would be sent to your email.')">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-primary" style="width:100%;">LOGIN</button>

        <!-- Register link -->
        <p style="text-align:center; margin-top:16px;">
          Don't have an account? <a href="register.html">Register here</a>
        </p>

      </form>
    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer>
    <div class="container">
      <div>
        <h4>About ClickEat</h4>
        <p>A modern restaurant serving authentic Malaysian cuisine.</p>
      </div>
      <div>
        <h4>Contact Us</h4>
        <p><i class="fa-solid fa-location-dot"></i> Jalan Teknologi, Melaka<br><i class="fa-solid fa-phone"></i> 012-345 6789<br><i class="fa-solid fa-envelope"></i> hello@clickeat.my</p>
      </div>
      <div>
        <h4>Operating Hours</h4>
        <p>Mon–Sat: 10AM–10PM<br>Sun: 12PM–9PM</p>
      </div>
    </div>
  </footer>

<script src="js/nav_bar.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
